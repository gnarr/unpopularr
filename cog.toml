ignore_merge_commits = true
branch_whitelist = ["main"]
pre_bump_hooks = [
  "cargo set-version {{version}}",
  "npm --prefix web version {{version}} --no-git-tag-version --allow-same-version",
  "cargo metadata --format-version 1 --no-deps",
  "cargo test --locked",
]

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
owner = "gnarr"
repository = "unpopularr"

[commit_types.perf]
changelog_title = "Performance"
bump_patch = true
